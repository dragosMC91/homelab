services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped

    ports:
      - "${QBIT_PORT:-8083}:8083"
      - "6881:6881"
      - "6881:6881/udp"

    volumes:
      - ./data/qbittorrent:/config
      - ${MEDIA_ROOT:-/mnt/nas-hdd/media}:/media

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Bucharest}
      - WEBUI_PORT=8083

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8083"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 1g

    labels:
      - "com.homelab.service=qbittorrent"
      - "com.homelab.description=Torrent Client"

    networks:
      - homelab

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped

    ports:
      - "${PROWLARR_PORT:-9696}:9696"

    volumes:
      - ./data/prowlarr:/config

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Bucharest}

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 256m

    labels:
      - "com.homelab.service=prowlarr"
      - "com.homelab.description=Indexer Manager"

    networks:
      - homelab

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped

    ports:
      - "${RADARR_PORT:-7878}:7878"

    volumes:
      - ./data/radarr:/config
      - ${MEDIA_ROOT:-/mnt/nas-hdd/media}:/media

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Bucharest}

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 512m

    labels:
      - "com.homelab.service=radarr"
      - "com.homelab.description=Movie Management"

    networks:
      - homelab

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped

    ports:
      - "${SONARR_PORT:-8989}:8989"

    volumes:
      - ./data/sonarr:/config
      - ${MEDIA_ROOT:-/mnt/nas-hdd/media}:/media

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Bucharest}

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 512m

    labels:
      - "com.homelab.service=sonarr"
      - "com.homelab.description=TV Show Management"

    networks:
      - homelab

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped

    ports:
      - "${SEERR_PORT:-5055}:5055"

    volumes:
      - ./data/seerr:/app/config

    environment:
      - TZ=${TZ:-Europe/Bucharest}

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5055"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 512m

    labels:
      - "com.homelab.service=seerr"
      - "com.homelab.description=Media Request Manager"

    networks:
      - homelab

networks:
  homelab:
    external: true

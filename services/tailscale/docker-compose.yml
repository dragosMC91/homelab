services:
  tailscale:
    image: tailscale/tailscale:v1.94.2
    container_name: tailscale
    restart: unless-stopped
    hostname: ${TS_HOSTNAME:-homelab}

    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW

    security_opt:
      - no-new-privileges:true

    volumes:
      - ./data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun

    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:---advertise-exit-node --ssh}
      - TS_USERSPACE=${TS_USERSPACE:-false}
      - TS_ACCEPT_DNS=${TS_ACCEPT_DNS:-false}

    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

    labels:
      - "com.homelab.service=tailscale"
      - "com.homelab.description=Mesh VPN / Secure Remote Access"
